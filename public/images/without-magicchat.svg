<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sliding light animation gradient -->
    <linearGradient id="slideLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <stop offset="40%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <stop offset="50%" style="stop-color:rgba(239,68,68,0.15);stop-opacity:0.15" />
      <stop offset="60%" style="stop-color:rgba(239,68,68,0.25);stop-opacity:0.25" />
      <stop offset="70%" style="stop-color:rgba(239,68,68,0.15);stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <animate attributeName="x1" values="-100%;200%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;300%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with sliding light animation -->
  <rect width="400" height="300" fill="url(#bgGrad)" rx="12"/>
  <rect width="400" height="300" fill="url(#slideLight)" rx="12"/>
  
  <!-- Animated chaotic particles -->
  <g opacity="0.3">
    <circle cx="50" cy="50" r="2" fill="#ef4444">
      <animate attributeName="cx" values="50;80;50" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;30;50" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="80" r="1.5" fill="#ef4444">
      <animate attributeName="cx" values="350;320;350" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;100;80" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="250" r="2" fill="#f97316">
      <animate attributeName="cx" values="150;180;150" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g opacity="0.8">
    <circle cx="60" cy="60" r="25" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="60" y="65" text-anchor="middle" font-size="12" fill="#94a3b8">Help?</text>
    
    <circle cx="120" cy="40" r="20" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="120" y="45" text-anchor="middle" font-size="10" fill="#94a3b8">Hi</text>
    
    <circle cx="45" cy="120" r="22" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="45" y="125" text-anchor="middle" font-size="10" fill="#94a3b8">When?</text>
    
    <circle cx="150" cy="100" r="28" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="150" y="105" text-anchor="middle" font-size="11" fill="#94a3b8">Problem!</text>
    
    <circle cx="100" cy="170" r="18" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="100" y="175" text-anchor="middle" font-size="9" fill="#94a3b8">??</text>
  </g>
  
  <!-- Animated broken connection lines -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.4">
    <line x1="60" y1="85" x2="120" y2="60">
      <animate attributeName="stroke-dasharray" values="4,4;8,8;4,4" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="120" y1="60" x2="150" y2="128">
      <animate attributeName="stroke-dasharray" values="4,4;8,8;4,4" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="60" y1="85" x2="45" y2="142">
      <animate attributeName="stroke-dasharray" values="4,4;8,8;4,4" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Frustrated user -->
  <g transform="translate(280, 230)">
    <circle cx="0" cy="0" r="25" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <circle cx="-8" cy="-5" r="3" fill="#94a3b8"/>
    <circle cx="8" cy="-5" r="3" fill="#94a3b8"/>
    <path d="M-8 8 Q0 0 8 8" stroke="#ef4444" stroke-width="2" fill="none"/>
    <line x1="-12" y1="-12" x2="-4" y2="-9" stroke="#ef4444" stroke-width="2"/>
    <line x1="12" y1="-12" x2="4" y2="-9" stroke="#ef4444" stroke-width="2"/>
    <path d="M15 -15 L18 -22 L21 -15" fill="#60a5fa" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- X marks with animation -->
  <g opacity="0.6">
    <text x="280" y="80" font-size="24" fill="#ef4444" text-anchor="middle">
      ✗
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="340" y="60" font-size="20" fill="#ef4444" text-anchor="middle">
      ✗
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </text>
    <text x="250" y="220" font-size="18" fill="#ef4444" text-anchor="middle">
      ✗
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </text>
  </g>
  
  <!-- Red glowing pulse ring -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.15">
    <animate attributeName="r" values="80;100;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
